<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Sambandh — connections, made meaningful</title>
<link rel="stylesheet" href="/styles.css?v=2"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='38' cy='50' r='26' fill='none' stroke='%23993556' stroke-width='9'/><circle cx='62' cy='50' r='26' fill='none' stroke='%23D4537E' stroke-width='9'/><circle cx='50' cy='50' r='7' fill='%234B1528'/></svg>"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<meta name="theme-color" content="#993556"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sambandh"/>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}</script>
</head>
<body>
<div id="app">
  <div id="screen" class="no-tabs"></div>
  <nav id="tabbar" style="display:none">
    <button data-tab="discover" onclick="nav('#/discover')"><svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Discover</span></button>
    <button data-tab="community" onclick="nav('#/community')"><svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Community</span></button>
    <button data-tab="astro" onclick="nav('#/astro')"><svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4-6.3-4.6L5.7 21 8 14 2 9.4h7.6z"/></svg><span>Astro</span></button>
    <button data-tab="chats" onclick="nav('#/chats')" style="position:relative"><svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>Chats</span><i id="chat-badge" style="display:none;position:absolute;top:8px;right:24%;background:var(--sindoor);color:#fff;font-style:normal;font-size:10px;font-weight:700;min-width:16px;height:16px;line-height:16px;border-radius:9px;padding:0 3px;text-align:center"></i></button>
    <button data-tab="karma" onclick="nav('#/karma')"><svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Lakshan</span></button>
    <button data-tab="settings" onclick="nav('#/settings')"><svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Me</span></button>
  </nav>
</div>
<div id="toast"></div>
<div id="modal-wrap" onclick="if(event.target===this)closeModal()"><div id="modal"></div></div>
<style>
  /* Two label types — kept visually distinct so a reading can never look verified. */
  .badge-fact{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
    color:#1a7a3a;background:rgba(63,191,114,.14);border:1px solid rgba(63,191,114,.45);border-radius:99px;padding:2px 9px}
  .badge-reading{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
    color:#8a5cc0;background:rgba(138,92,192,.12);border:1px solid rgba(138,92,192,.45);border-radius:99px;padding:2px 9px}
</style>
<script src="/socket.io/socket.io.js"></script>
<script src="/badge.js?v=1"></script>
<script src="/app.js?v=2"></script>
</body>
</html>
