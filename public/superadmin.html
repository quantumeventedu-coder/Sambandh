<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sambandh — Super Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='38' cy='50' r='26' fill='none' stroke='%23F3C14B' stroke-width='9'/><circle cx='62' cy='50' r='26' fill='none' stroke='%23D4537E' stroke-width='9'/></svg>"/>
<style>
  :root { --bg:#14060d; --panel:#1f0d16; --line:#3a2230; --ink:#f0e6ea; --mut:#9d8391;
          --pink:#D4537E; --gold:#F3C14B; --green:#3fbf72; --red:#e05c5c; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); font-size:14px; line-height:1.5; }
  .wrap { max-width:1180px; margin:0 auto; padding:18px 20px 60px; }
  h1 { font-family:Georgia,serif; font-size:22px; } h1 .sup { color:var(--gold); }
  .sub { color:var(--mut); font-size:12px; margin-bottom:16px; }
  .bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:18px; }
  input, textarea, select { background:var(--panel); border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:9px 12px; font-size:13.5px; outline:none; }
  input:focus, textarea:focus { border-color:var(--pink); }
  button { background:var(--pink); border:0; color:#fff; font-weight:700; border-radius:8px;
    padding:9px 16px; cursor:pointer; font-size:13.5px; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--mut); }
  button.gold { background:var(--gold); color:#3a2400; }
  button.red { background:var(--red); }
  .tabs { display:flex; gap:6px; margin:14px 0 18px; }
  .tabs button { background:transparent; border:1px solid var(--line); color:var(--mut); }
  .tabs button.on { background:var(--pink); border-color:var(--pink); color:#fff; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .stat b { display:block; font-size:26px; font-family:Georgia,serif; color:var(--gold); }
  .stat span { font-size:11.5px; color:var(--mut); letter-spacing:.4px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:1px; }
  tr.click { cursor:pointer; } tr.click:hover td { background:rgba(212,83,126,.07); }
  .pill { display:inline-block; padding:2px 9px; border-radius:99px; font-size:11px; font-weight:700; }
  .pill.g { background:rgba(63,191,114,.15); color:var(--green); }
  .pill.y { background:rgba(243,193,75,.15); color:var(--gold); }
  .pill.r { background:rgba(224,92,92,.15); color:var(--red); }
  .pill.p { background:rgba(212,83,126,.18); color:var(--pink); }
  .msg { max-width:74%; padding:8px 12px; border-radius:12px; margin-bottom:8px; background:#2a1520; border:1px solid var(--line); }
  .msg.b { margin-left:auto; background:#33101f; border-color:#4b2033; }
  .msg .who { font-size:10.5px; color:var(--gold); font-weight:700; margin-bottom:2px; }
  .msg .when { font-size:10px; color:var(--mut); margin-top:3px; }
  .notice { border-left:3px solid var(--gold); background:rgba(243,193,75,.07); padding:10px 14px; border-radius:8px;
            font-size:12.5px; color:#e8d9b0; margin-bottom:14px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; } @media(max-width:860px){ .grid2{grid-template-columns:1fr} }
  a.back { color:var(--pink); cursor:pointer; font-size:12.5px; text-decoration:none; display:inline-block; margin-bottom:10px; }
  pre { white-space:pre-wrap; font-size:12px; color:var(--mut); }
  #toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--gold); color:#3a2400;
           padding:10px 20px; border-radius:99px; font-weight:700; display:none; z-index:99; }
</style>
</head>
<body>
<div class="wrap">
  <h1>sambandh <span class="sup">/ super admin</span></h1>
  <div class="sub">Owner-only console. Every content access is permanently audit-logged — including yours.</div>

  <div class="bar">
    <input id="key" type="password" placeholder="Super admin key" style="flex:1;max-width:340px"/>
    <button onclick="connect()">Connect</button>
    <span id="conn" class="pill r">disconnected</span>
  </div>

  <div id="panel" style="display:none">
    <div class="tabs">
      <button id="tb-overview" class="on" onclick="show('overview')">Overview</button>
      <button id="tb-users" onclick="show('users')">Users &amp; Chats</button>
      <button id="tb-llm" onclick="show('llm')">AI Engine</button>
      <button id="tb-audit" onclick="show('audit')">Audit trail</button>
      <button id="tb-test" onclick="show('test')">System Test</button>
    </div>
    <div id="view"></div>
  </div>
</div>
<div id="toast"></div>

<script>
let KEY = null;
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){ const t=$('#toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 3200); }

async function api(path) {
  const r = await fetch('/api/superadmin' + path, { headers: { 'X-Super-Key': KEY } });
  const j = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
  return j;
}
async function apiPost(path, body) {
  const r = await fetch('/api/superadmin' + path, { method:'POST',
    headers: { 'X-Super-Key': KEY, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
  const j = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
  return j;
}
async function apiPut(path, body) {
  const r = await fetch('/api/superadmin' + path, { method:'PUT',
    headers: { 'X-Super-Key': KEY, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
  const j = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
  return j;
}

async function connect() {
  KEY = $('#key').value.trim();
  try {
    await api('/stats');
    // Remember it only after the server accepted it, and only on this machine.
    try { sessionStorage.setItem('sb_super_key', KEY); } catch { /* private mode */ }
    $('#conn').textContent = 'connected · full access'; $('#conn').className = 'pill g';
    $('#panel').style.display = 'block';
    show('overview');
  } catch (e) {
    try { sessionStorage.removeItem('sb_super_key'); } catch { /* ignore */ }
    $('#conn').textContent = 'rejected'; $('#conn').className = 'pill r';
    toast(e.message);
  }
}

function show(tab) {
  ['overview','users','llm','audit','test'].forEach(t => $('#tb-'+t).classList.toggle('on', t===tab));
  if (tab==='overview') renderOverview();
  if (tab==='users') renderUsers();
  if (tab==='llm') renderLLM();
  if (tab==='audit') renderAudit();
  if (tab==='test') renderTest();
}

async function renderTest() {
  $('#view').innerHTML = `<div class="card">
    <h3 style="font-family:Georgia,serif;margin-bottom:4px">System Test — every subsystem, unrestricted</h3>
    <div class="sub">Runs each engine and integration live and reports pass/fail. This is your rehearsal console — it shows exactly where the app is solid and where quality is low (unconfigured integrations, fallbacks).</div>
    <div class="bar" style="margin:12px 0"><button class="gold" onclick="runTest()">Run full self-test</button><span id="test-summary" class="sub"></span></div>
    <div id="test-results"></div></div>`;
}
async function runTest() {
  const box = $('#test-results'); const sum = $('#test-summary');
  box.innerHTML = '<div class="sub">Running…</div>'; sum.textContent = '';
  try {
    const r = await api('/selftest');
    sum.innerHTML = ` <span class="pill ${r.summary.allGreen?'g':'y'}">${r.summary.passed}/${r.summary.total} passed</span>`;
    const groups = {};
    r.checks.forEach(c => { (groups[c.group] = groups[c.group] || []).push(c); });
    box.innerHTML = Object.entries(groups).map(([g, cs]) => `<div style="margin-top:12px"><b style="font-size:13px;color:var(--mut)">${esc(g)}</b>
      <table style="margin-top:6px"><tr><th>Feature</th><th>Status</th><th>Detail</th></tr>
      ${cs.map(c => `<tr><td>${esc(c.name)}</td><td><span class="pill ${c.ok?'g':'r'}">${c.ok?'PASS':'FAIL'}</span></td><td class="sub">${esc(c.detail)}</td></tr>`).join('')}
      </table></div>`).join('');
  } catch (e) { box.innerHTML = `<div class="notice">${esc(e.message)}</div>`; }
}

async function renderOverview() {
  const [s, pl] = await Promise.all([api('/stats'), api('/prelaunch')]);
  const launched = !pl.prelaunch;
  $('#view').innerHTML = `
    <div class="card" style="margin-bottom:14px;border:1px solid ${launched ? '#2e7d46' : '#b8860b'}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <div>
          <b style="font-size:15px">${launched ? '🟢 LAUNCHED — open to everyone' : '🔒 Pre-launch (early access)'}</b>
          <div style="color:var(--mut);font-size:13px;margin-top:4px">${launched ? 'All verified members can use Discover, Chats & matching.' : 'People can register + pay + build a profile, but Discover/Chats/matching are gated (waiting room). Admins bypass.'}</div>
          <div style="color:var(--mut);font-size:12px;margin-top:6px">Registered <b>${pl.registered}</b> · Paid <b>${pl.paid}</b> · Photo-verified <b>${pl.verified}</b> · Email waitlist <b>${pl.emailWaitlist}</b></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button onclick="togglePrelaunch(${launched})" style="background:${launched ? 'transparent' : 'var(--pink)'};border:1px solid var(--pink);white-space:nowrap">
            ${launched ? 'Return to pre-launch' : 'Open the doors — LAUNCH'}
          </button>
          <button onclick="purgeTestData()" class="ghost" style="white-space:nowrap;font-size:12px">Purge demo/test accounts</button>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><b>${s.users.total}</b><span>USERS</span></div>
      <div class="stat"><b>${s.users.verified}</b><span>ID VERIFIED</span></div>
      <div class="stat"><b>${s.users.paid}</b><span>JOIN FEE PAID</span></div>
      <div class="stat"><b>${s.users.base ?? 0} / ${s.users.pro} / ${s.users.max}</b><span>BASE / PRO / MAX</span></div>
      <div class="stat"><b>${s.users.suspended} / ${s.users.banned}</b><span>SUSPENDED / BANNED</span></div>
      <div class="stat"><b>${s.chats.total}</b><span>CHATS</span></div>
      <div class="stat"><b>${s.chats.messages24h}</b><span>MESSAGES · 24H</span></div>
      <div class="stat"><b>${s.moderation.reportsPending}</b><span>REPORTS PENDING</span></div>
      <div class="stat"><b>${s.moderation.reportsEscalated}</b><span>AUTO-ESCALATED</span></div>
      <div class="stat"><b>CHF ${s.revenue.totalCHF}</b><span>REVENUE (${s.revenue.capturedPayments} PAYMENTS)</span></div>
    </div>
    <div class="notice" style="margin-top:14px">Chat content access lives under <b>Users &amp; Chats</b> and always
      requires a written reason. Admins/moderators cannot see message content at all — only you can, and it's logged.</div>`;
}

async function purgeTestData() {
  if (!confirm('Delete ALL demo/test accounts (no real email, not admin) and their data? Real & admin accounts are kept. This cannot be undone.')) return;
  try {
    const r = await apiPost('/purge-test-data', { confirm: true });
    alert(r.message || ('Deleted ' + r.deleted + ', kept ' + r.kept));
    renderOverview();
  } catch (e) { alert('Purge failed: ' + e.message); }
}

async function togglePrelaunch(launching) {
  const msg = launching
    ? 'LAUNCH now? Discover, Chats and matching will open to EVERY verified member. Continue?'
    : 'Return to pre-launch? Dating features will be gated (waiting room) for all non-admins.';
  if (!confirm(msg)) return;
  await apiPut('/prelaunch', { prelaunch: !launching });   // launching → prelaunch:false
  renderOverview();
}

async function renderUsers() {
  $('#view').innerHTML = `
    <div class="bar">
      <input id="q" placeholder="Search phone / name / user id…" style="flex:1;max-width:420px"
             onkeydown="if(event.key==='Enter')searchUsers()"/>
      <button onclick="searchUsers()">Search</button>
      <button class="ghost" onclick="searchUsers('')">Latest 25</button>
    </div>
    <div id="results"></div><div id="detail"></div>`;
  searchUsers('');
}

async function searchUsers(force) {
  const q = force !== undefined ? force : $('#q').value.trim();
  const { users } = await api('/users?q=' + encodeURIComponent(q));
  $('#detail').innerHTML = '';
  $('#results').innerHTML = `<div class="card"><table>
    <tr><th>User</th><th>Phone</th><th>Tier</th><th>Lakshan</th><th>Status</th><th>Last active</th></tr>
    ${users.map(u => `<tr class="click" onclick="openUser('${u.id}')">
      <td><b>${esc(u.name)}</b> · ${esc(u.gender||'—')}, ${u.age||'—'} · ${esc(u.city||'—')}</td>
      <td>${esc(u.phone)}</td>
      <td><span class="pill ${u.tier==='max'?'y':u.tier==='pro'?'p':'g'}">${u.tier}</span></td>
      <td>${u.karma}</td>
      <td>${u.banned?'<span class="pill r">banned</span>':u.suspended?'<span class="pill y">suspended</span>':u.deletedAt?'<span class="pill r">deleting</span>':'<span class="pill g">active</span>'}
          ${u.idVerified?'':' <span class="pill y">unverified</span>'}</td>
      <td>${u.lastActiveAt ? new Date(u.lastActiveAt).toLocaleString() : '—'}</td>
    </tr>`).join('')}
  </table></div>`;
}

async function openUser(id) {
  const d = await api('/users/' + id);
  const { chats } = await api('/users/' + id + '/chats');
  const u = d.user;
  $('#results').innerHTML = '';
  $('#detail').innerHTML = `
    <a class="back" onclick="renderUsers()">← back to search</a>
    <div class="grid2">
      <div class="card">
        <h3 style="font-family:Georgia,serif">${esc(u.profile?.displayName || u.profile?.firstName || '—')}
          <span class="pill p">${esc(u.membership?.tier||'free')}</span>
          ${d.risk ? `<span class="pill" style="background:${d.risk.tier==='critical'?'#c0392b':d.risk.tier==='high'?'#d97706':d.risk.tier==='elevated'?'#8a6a10':'#14683a'};color:#fff">RISK ${d.risk.score} · ${d.risk.tier.toUpperCase()}</span>` : ''}</h3>
        ${d.risk && d.risk.reasons.length ? `<div style="font-size:11.5px;color:#b45309;margin:4px 0 6px">⚠ ${d.risk.reasons.slice(0,3).map(esc).join(' · ')}</div>` : ''}
        <pre>${esc(u.phone || u.email || '—')} · ${esc(u.profile?.gender||'—')}, ${u.profile?.age||'—'} · ${esc(u.profile?.city||'—')}
Joined ${new Date(u.createdAt).toLocaleDateString()} · Lakshan ${d.karma?.score ?? 100} · ${d.chatCount} chats
ID ${u.verification?.idVerified?'✓':'✗'} · Selfie ${u.verification?.selfieVerified?'✓':'✗'} · Fee ${u.membership?.joinFeePaid?'CHF '+(u.membership?.joinFeeAmountCHF??'?')+' paid':'unpaid'}</pre>
        <div class="bar" style="margin:8px 0 0">
          <button class="ghost" onclick="act('${u._id}','warn')">Warn</button>
          <button class="ghost" onclick="act('${u._id}','suspend_24h')">Suspend 24h</button>
          <button class="ghost" onclick="act('${u._id}','suspend_7d')">Suspend 7d</button>
          <button class="red" onclick="act('${u._id}','ban')">Ban</button>
          ${u.membership?.joinFeePaid?'':`<button class="gold" onclick="act('${u._id}','waive_fee')">Waive fee</button>`}
          ${u.status?.suspended?`<button class="gold" onclick="act('${u._id}','unsuspend')">Unsuspend</button>`:''}
          ${u.status?.banned?`<button class="gold" onclick="act('${u._id}','unban')">Unban</button>`:''}
        </div>
      </div>
      <div class="card">
        <h3>Reports against: ${d.reportsAgainst.length} · filed: ${d.reportsBy.length} · payments: ${d.payments.length}</h3>
        <pre>${d.reportsAgainst.slice(0,6).map(r => `[${r.status}] ${r.category} — ${esc((r.description||'').slice(0,80))}`).join('\n') || 'No reports against this user.'}</pre>
        <pre>${d.payments.slice(0,6).map(p => `${p.status} · ${p.purpose} · CHF ${p.amountCHF}`).join('\n') || 'No payments.'}</pre>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:8px">Chats (${chats.length})</h3>
      <div class="notice">Opening a chat requires a written reason and is permanently recorded in the audit trail.</div>
      <table><tr><th>With</th><th>Msgs</th><th>Last activity</th><th>Mode</th><th></th></tr>
        ${chats.map(c => `<tr>
          <td>${esc(c.with)}</td><td>${c.messageCount}</td>
          <td>${c.lastMessageAt ? new Date(c.lastMessageAt).toLocaleString() : '—'}</td>
          <td>${c.anonymous?'<span class="pill y">anonymous</span>':''} ${c.status==='archived'?'<span class="pill r">archived</span>':''}</td>
          <td><button class="ghost" onclick="openChat('${c.chatId}')">Inspect…</button></td>
        </tr>`).join('') || '<tr><td colspan="5">No chats.</td></tr>'}
      </table>
    </div>`;
}

async function act(id, action) {
  const reason = prompt(`Reason for "${action}" (recorded in the audit log):`);
  if (!reason) return;
  try { await apiPost('/users/' + id + '/action', { action, reason }); toast('Done: ' + action); openUser(id); }
  catch (e) { toast(e.message); }
}

async function openChat(chatId) {
  const reason = prompt('Written reason for viewing this conversation (min 10 chars — this is permanently audit-logged):');
  if (!reason) return;
  try {
    const d = await api('/chats/' + chatId + '/messages?reason=' + encodeURIComponent(reason));
    const a = d.chat.participants[0]?.userId;
    $('#detail').innerHTML = `
      <a class="back" onclick="renderUsers()">← back</a>
      <div class="card">
        <h3 style="margin-bottom:4px">${d.chat.participants.map(p=>esc(p.name)).join(' ⇄ ')}</h3>
        <div class="sub">${d.messages.length} messages · ${d.chat.anonymous?'anonymous chat · ':''}intent: ${esc(d.chat.intent||'—')}</div>
        <div class="notice">Access recorded. Reason on file: “${esc(reason)}”</div>
        ${d.messages.map(m => `<div class="msg ${String(m.fromId)===String(a)?'':'b'}">
          <div class="who">${esc(m.from)}</div>${esc(m.text)}
          <div class="when">${new Date(m.createdAt).toLocaleString()}${m.readAt?' · read':''}</div></div>`).join('')}
      </div>`;
  } catch (e) { toast(e.message); }
}

async function renderLLM() {
  const s = await api('/llm');
  const { keys } = await api('/ai-keys');
  const m = await api('/ai/model');
  const num = n => (n || 0).toLocaleString();
  const feat = (k, label) => `
    <label style="display:flex;align-items:center;gap:8px;font-size:13px">
      <input type="checkbox" id="feat-${k}" ${s.features?.[k] !== false ? 'checked' : ''}/> ${label}
    </label>`;
  $('#view').innerHTML = `
    <div class="grid2">
      <div class="card">
        <h3 style="font-family:Georgia,serif;margin-bottom:4px">AI Engine
          <span class="pill ${s.enabled && s.keyConfigured ? 'g' : 'r'}">${s.enabled ? (s.keyConfigured ? 'ON' : 'NO KEY') : 'OFF'}</span></h3>
        <div class="sub">Controls the LLM behind the Lakshan Book, reputation scoring, and the AI API.
          Settings here override server env. The key is stored securely and shown masked only.</div>

        <label style="display:flex;align-items:center;gap:8px;margin:10px 0 12px;font-size:13.5px">
          <input type="checkbox" id="llm-enabled" ${s.enabled ? 'checked' : ''}/>
          <b>Engine enabled</b> — when off, all AI features fall back to the deterministic rule engines.
        </label>

        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <div class="sub" style="margin-bottom:3px">API key ${s.keyConfigured ? `· current: <b>${esc(s.keyMasked || '')}</b> (from ${esc(s.keySource)})` : '· <b style="color:var(--red)">none set</b>'}</div>
            <input id="llm-key" type="password" placeholder="Paste new Anthropic key (leave blank to keep)" style="width:100%"/>
            <div class="sub" style="margin-top:4px"><a class="back" style="margin:0" onclick="clearKey()">Remove panel key (revert to server env)</a></div>
          </div>
          <div>
            <div class="sub" style="margin-bottom:3px">Model</div>
            <select id="llm-model" style="width:100%">
              ${['claude-haiku-4-5-20251001','claude-sonnet-5','claude-opus-4-8','claude-fable-5']
                .map(m => `<option value="${m}" ${s.model===m?'selected':''}>${m}</option>`).join('')}
              ${['claude-haiku-4-5-20251001','claude-sonnet-5','claude-opus-4-8','claude-fable-5'].includes(s.model)?'':`<option value="${esc(s.model)}" selected>${esc(s.model)}</option>`}
            </select>
          </div>
          <div>
            <div class="sub" style="margin-bottom:3px">Max output tokens</div>
            <input id="llm-maxtok" type="number" min="16" max="8192" value="${s.maxTokens || 1024}" style="width:140px"/>
          </div>
          <div>
            <div class="sub" style="margin-bottom:5px">Features</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${feat('karma','Lakshan Book (lie / contradiction / manipulation detection)')}
              ${feat('reputation','Reputation scoring (behavioural signals)')}
              ${feat('api','Reusable AI API')}
            </div>
          </div>
        </div>

        <div class="bar" style="margin-top:14px">
          <button class="gold" onclick="saveLLM()">Save settings</button>
          <button class="ghost" onclick="testLLM()">Test connection</button>
          <span id="llm-test"></span>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:8px">Usage</h3>
        <div class="stats" style="grid-template-columns:1fr 1fr">
          <div class="stat"><b>${num(s.usage?.calls)}</b><span>TOTAL CALLS</span></div>
          <div class="stat"><b>${num(s.usage?.errors)}</b><span>ERRORS</span></div>
          <div class="stat"><b>${num(s.usage?.inputTokens)}</b><span>INPUT TOKENS</span></div>
          <div class="stat"><b>${num(s.usage?.outputTokens)}</b><span>OUTPUT TOKENS</span></div>
          <div class="stat"><b>CHF ${(s.usage?.estimatedCostCHF ?? 0)}</b><span>EST. SPEND</span></div>
          <div class="stat"><b style="font-size:14px">${s.usage?.lastUsedAt ? new Date(s.usage.lastUsedAt).toLocaleString() : '—'}</b><span>LAST USED</span></div>
        </div>
        <div class="notice" style="margin-top:12px">Cost is an estimate at Haiku-class pricing, for guidance only — not billing.
          Turning the engine off (or removing the key) instantly reverts every AI feature to the always-on rule engines, so the app never breaks.</div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-family:Georgia,serif;margin-bottom:4px">Reusable AI API keys</h3>
      <div class="sub">Give your other apps a key to call this engine at
        <b>POST /api/ai/complete</b> with header <b>X-AI-Key</b>. Keys are shown once; only a hash is stored.</div>
      <div class="bar" style="margin:10px 0 4px">
        <input id="ak-name" placeholder="App name (e.g. EdurankAI)" style="flex:1;max-width:280px"/>
        <input id="ak-rate" type="number" min="1" max="6000" value="60" title="Requests / minute" style="width:120px"/>
        <button class="gold" onclick="createAiKey()">Create key</button>
      </div>
      <div id="ak-new"></div>
      <table style="margin-top:10px">
        <tr><th>App</th><th>Key</th><th>Calls</th><th>Tokens (in/out)</th><th>Rate</th><th>Last used</th><th></th></tr>
        ${keys.length ? keys.map(k => `<tr>
          <td><b>${esc(k.name)}</b></td>
          <td><code>${esc(k.prefix)}…</code></td>
          <td>${num(k.calls)}</td>
          <td>${num(k.inputTokens)} / ${num(k.outputTokens)}</td>
          <td>${k.rateLimitPerMin}/min</td>
          <td>${k.lastUsedAt ? new Date(k.lastUsedAt).toLocaleString() : '—'}</td>
          <td style="white-space:nowrap">
            <button class="ghost" onclick="toggleAiKey('${k.id}')">${k.disabled ? 'Enable' : 'Disable'}</button>
            <button class="red" onclick="revokeAiKey('${k.id}')">Revoke</button>
            ${k.disabled ? ' <span class="pill r">disabled</span>' : ''}
          </td>
        </tr>`).join('') : '<tr><td colspan="7">No API keys yet.</td></tr>'}
      </table>
    </div>

    <div class="card">
      <h3 style="font-family:Georgia,serif;margin-bottom:4px">Self-learning match model
        ${m.model ? `<span class="pill g">trained · ${Math.round((m.model.accuracy||0)*100)}% acc</span>` : '<span class="pill y">not trained yet</span>'}</h3>
      <div class="sub">Sambandh's own model — a logistic regression trained in-house on <b>anonymised</b> swipe
        outcomes from users who opted in. No names or messages are ever stored. It blends into discover ranking once trained.</div>
      <div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-top:10px">
        <div class="stat"><b>${num(m.examples)}</b><span>ORGANIC EXAMPLES</span></div>
        <div class="stat"><b>${num(m.consentingUsers)}</b><span>OPTED-IN USERS</span></div>
        <div class="stat"><b>${m.model ? Math.round((m.model.accuracy||0)*100)+'%' : '—'}</b><span>HOLDOUT ACCURACY</span></div>
        <div class="stat"><b style="font-size:14px">${m.model?.trainedAt ? new Date(m.model.trainedAt).toLocaleString() : '—'}</b><span>LAST TRAINED</span></div>
      </div>
      ${m.model ? `<div style="margin-top:10px;font-size:12px;color:var(--mut)">Learned feature weights:
        <div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:6px">
          ${m.model.featureNames.map((f,i)=>`<span class="pill ${m.model.weights[i]>=0?'g':'r'}">${esc(f)}: ${m.model.weights[i]>0?'+':''}${m.model.weights[i]}</span>`).join('')}
        </div></div>` : ''}
      <div class="bar" style="margin-top:12px">
        <button class="gold" onclick="trainModel()">Train now</button>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px">
          <input type="checkbox" id="model-auto" ${m.auto?'checked':''} onchange="toggleAuto()"/> Auto-retrain nightly
        </label>
        <span id="train-status" class="sub"></span>
      </div>
    </div>

    <div class="card">
      <h3 style="font-family:Georgia,serif;margin-bottom:4px">Neural network model
        ${m.neural ? `<span class="pill g">trained · ${Math.round((m.neural.accuracy||0)*100)}% acc</span>` : '<span class="pill y">not trained yet</span>'}
        ${m.active==='neural' ? '<span class="pill g">serving ranking</span>' : ''}</h3>
      <div class="sub">A real multi-layer neural network trained by Sambandh's <b>own autograd engine</b>
        (<code>services/nn</code>) — no external ML library. It learns feature <b>interactions</b> the linear
        model can't (e.g. "shared intent <i>and</i> close age"), and takes over ranking once trained.</div>
      <div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-top:10px">
        <div class="stat"><b>${m.neural ? Math.round((m.neural.accuracy||0)*100)+'%' : '—'}</b><span>HOLDOUT ACCURACY</span></div>
        <div class="stat"><b>${m.neural ? num(m.neural.paramCount) : '—'}</b><span>PARAMETERS</span></div>
        <div class="stat"><b style="font-size:14px">${m.neural?.sizes ? m.neural.sizes.join('→') : '—'}</b><span>ARCHITECTURE</span></div>
        <div class="stat"><b style="font-size:14px">${m.neural?.trainedAt ? new Date(m.neural.trainedAt).toLocaleString() : '—'}</b><span>LAST TRAINED</span></div>
      </div>
      <div class="bar" style="margin-top:12px">
        <button class="gold" onclick="trainNeuralModel()">Train neural net</button>
        <button onclick="explainNeural()">Explain (feature importance)</button>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px">
          <input type="checkbox" id="neural-auto" ${m.neuralAuto?'checked':''} onchange="toggleNeuralAuto()"/> Auto-retrain nightly
        </label>
        <span id="neural-status" class="sub"></span>
      </div>
      <div id="neural-explain" style="margin-top:12px"></div>
    </div>`;
}

async function explainNeural() {
  const box = $('#neural-explain'); box.innerHTML = '<span class="sub">computing permutation importance…</span>';
  try {
    const r = await api('/ai/explain');
    if (!r.available) { box.innerHTML = `<span class="pill y">${esc(r.reason||'unavailable')}</span>`; return; }
    const max = Math.max(...r.importance.map(x=>x.importance), 0.0001);
    box.innerHTML = `<div class="sub">Permutation importance — how much accuracy drops when each feature is scrambled
      (baseline ${Math.round(r.baseAccuracy*100)}% on ${num(r.examples)} examples). This probes the trained network's
      actual behaviour, not its raw weights.</div>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px">
        ${r.importance.map(x=>`<div style="display:flex;align-items:center;gap:8px">
          <span style="width:120px;font-size:12px;color:var(--mut)">${esc(x.feature)}</span>
          <span style="flex:1;background:rgba(120,120,120,.15);border-radius:4px;height:14px;position:relative">
            <span style="position:absolute;left:0;top:0;bottom:0;width:${Math.round(x.importance/max*100)}%;background:var(--gold,#c8a24a);border-radius:4px"></span>
          </span>
          <span style="width:52px;text-align:right;font-size:12px">${(x.importance*100).toFixed(1)}%</span>
        </div>`).join('')}
      </div>`;
  } catch (e) { box.innerHTML = `<span class="pill r">${esc(e.message)}</span>`; }
}

async function trainModel() {
  const el = $('#train-status'); el.textContent = 'training…';
  try {
    const r = await apiPost('/ai/train', {});
    el.innerHTML = r.trained
      ? `<span class="pill g">trained: ${Math.round(r.accuracy*100)}% on ${r.examples} examples</span>`
      : `<span class="pill y">${esc(r.reason||'not enough data')}</span>`;
    setTimeout(renderLLM, 1200);
  } catch (e) { el.innerHTML = `<span class="pill r">${esc(e.message)}</span>`; }
}
async function toggleAuto() {
  try { await apiPut('/ai/model', { auto: $('#model-auto').checked }); toast('Auto-retrain ' + ($('#model-auto').checked?'on':'off')); }
  catch (e) { toast(e.message); }
}

async function trainNeuralModel() {
  const el = $('#neural-status'); el.textContent = 'training neural net…';
  try {
    const r = await apiPost('/ai/train', { mode: 'neural' });
    const n = r.neural || {};
    el.innerHTML = n.trained
      ? `<span class="pill g">trained: ${Math.round(n.accuracy*100)}% · ${n.paramCount} params · ${(n.sizes||[]).join('→')}</span>`
      : `<span class="pill y">${esc(n.reason||'need ≥60 examples')}</span>`;
    setTimeout(renderLLM, 1200);
  } catch (e) { el.innerHTML = `<span class="pill r">${esc(e.message)}</span>`; }
}
async function toggleNeuralAuto() {
  try { await apiPut('/ai/model', { neuralAuto: $('#neural-auto').checked }); toast('Neural auto-retrain ' + ($('#neural-auto').checked?'on':'off')); }
  catch (e) { toast(e.message); }
}

async function createAiKey() {
  const name = $('#ak-name').value.trim();
  if (!name) return toast('Enter an app name');
  const rateLimitPerMin = parseInt($('#ak-rate').value) || 60;
  try {
    const r = await apiPost('/ai-keys', { name, rateLimitPerMin });
    $('#ak-new').innerHTML = `<div class="notice" style="margin-top:8px">New key for <b>${esc(r.name)}</b> — copy it now, it won't be shown again:
      <div style="margin-top:6px"><code style="user-select:all;word-break:break-all;color:var(--gold)">${esc(r.key)}</code></div></div>`;
    $('#ak-name').value = '';
    // re-render the table but preserve the just-shown key notice
    const notice = $('#ak-new').innerHTML;
    await renderLLM();
    $('#ak-new').innerHTML = notice;
  } catch (e) { toast(e.message); }
}
async function toggleAiKey(id) {
  try { await apiPost('/ai-keys/' + id + '/toggle', {}); renderLLM(); } catch (e) { toast(e.message); }
}
async function revokeAiKey(id) {
  if (!confirm('Revoke this key permanently? Apps using it will stop working immediately.')) return;
  try {
    const r = await fetch('/api/superadmin/ai-keys/' + id, { method:'DELETE', headers:{ 'X-Super-Key': KEY } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    toast('Key revoked'); renderLLM();
  } catch (e) { toast(e.message); }
}

async function saveLLM() {
  const patch = {
    enabled: $('#llm-enabled').checked,
    model: $('#llm-model').value,
    maxTokens: parseInt($('#llm-maxtok').value) || 1024,
    features: {
      karma: $('#feat-karma').checked,
      reputation: $('#feat-reputation').checked,
      api: $('#feat-api').checked
    }
  };
  const key = $('#llm-key').value.trim();
  if (key) patch.apiKey = key;
  try { await apiPut('/llm', patch); toast('AI settings saved'); renderLLM(); }
  catch (e) { toast(e.message); }
}
async function clearKey() {
  if (!confirm('Remove the panel API key and revert to the server env key (if any)?')) return;
  try { await apiPut('/llm', { apiKey: 'CLEAR' }); toast('Panel key removed'); renderLLM(); }
  catch (e) { toast(e.message); }
}
async function testLLM() {
  const el = $('#llm-test'); el.textContent = 'testing…'; el.className = 'sub';
  try {
    const r = await apiPost('/llm/test', {});
    el.innerHTML = r.ok ? '<span class="pill g">connection OK</span>' : `<span class="pill r">unexpected reply: ${esc(r.reply||'')}</span>`;
  } catch (e) { el.innerHTML = `<span class="pill r">${esc(e.message)}</span>`; }
}

async function renderAudit() {
  const { entries } = await api('/audit?limit=200');
  $('#view').innerHTML = `<div class="card"><table>
    <tr><th>When</th><th>Actor</th><th>Action</th><th>Target</th><th>Detail</th></tr>
    ${entries.map(e => `<tr>
      <td style="white-space:nowrap">${new Date(e.createdAt).toLocaleString()}</td>
      <td>${esc(e.actor)}</td>
      <td><span class="pill ${e.action==='sa_chat_inspected'?'y':'p'}">${esc(e.action)}</span></td>
      <td>${esc(e.targetType||'')} ${esc(String(e.targetId||'').slice(-8))}</td>
      <td><pre style="margin:0">${esc(JSON.stringify(e.detail||{}, null, 0).slice(0, 220))}</pre></td>
    </tr>`).join('') || '<tr><td colspan="5">No entries yet.</td></tr>'}
  </table></div>`;
}

// Dev convenience: in dev mode, pre-fill the dev key so the owner can test instantly.
fetch('/health').then(r=>r.json()).then(h => {
  // Never hardcode a key in a file served to the public — that is how the old
  // dev keys ended up in git forever. In dev, paste your SUPER_ADMIN_KEY once and
  // it is remembered locally.
  if (h.devMode) {
    const saved = sessionStorage.getItem('sb_super_key');
    if (saved) { $('#key').value = saved; connect(); } else { $('#key').focus(); }
  }
}).catch(()=>{});
</script>
</body>
</html>
