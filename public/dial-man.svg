<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 760" preserveAspectRatio="xMidYMax meet">
  <defs>
    <radialGradient id="auraM" cx="50%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#F3C14B" stop-opacity=".5"/>
      <stop offset="42%" stop-color="#D4537E" stop-opacity=".24"/>
      <stop offset="72%" stop-color="#4B1528" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c9ad"/>
      <stop offset="55%" stop-color="#b98a66"/>
      <stop offset="100%" stop-color="#341019"/>
    </linearGradient>
    <linearGradient id="hairM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241012"/>
      <stop offset="100%" stop-color="#0d0607"/>
    </linearGradient>
  </defs>
  <rect width="460" height="760" fill="url(#auraM)"/>
  <!-- broader shoulders -->
  <path d="M52 760 C 78 578 148 512 230 512 C 312 512 382 578 408 760 Z" fill="url(#bodyM)" opacity=".92"/>
  <!-- neck (thicker) -->
  <rect x="196" y="424" width="68" height="120" rx="24" fill="url(#bodyM)"/>
  <!-- head (squarer jaw) -->
  <path d="M138 322 C 138 236 178 196 230 196 C 282 196 322 236 322 322 C 322 392 292 448 230 452 C 168 448 138 392 138 322 Z" fill="url(#bodyM)"/>
  <!-- short hair -->
  <path d="M140 314 C 140 214 186 176 230 176 C 274 176 320 214 320 314 C 320 286 306 268 300 268 C 300 240 268 224 230 224 C 192 224 160 240 160 268 C 154 268 140 286 140 314 Z" fill="url(#hairM)"/>
  <!-- soft rim light -->
  <path d="M316 296 C 326 356 312 410 296 448" fill="none" stroke="#F3C14B" stroke-width="3" stroke-opacity=".45" stroke-linecap="round"/>
</svg>
