name: CI

# Runs on every PR and on main. Make this a REQUIRED status check in
# Settings → Branches → Branch protection, or it advises instead of blocks.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · test · coverage · audit · boot
    runs-on: ubuntu-22.04    # pinned: 'latest' silently moves (22.04→24.04) and mongod builds are distro-specific
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # gitleaks needs history to scan commits

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # package-lock.json (lockfileVersion 3) is written by npm 11 locally. Pin the
      # runner to the same major so `npm ci` reads exactly what was written — a
      # toolchain that drifts between dev and CI is a non-reproducible build.
      - name: Pin npm to match the lockfile
        run: npm install -g npm@11

      - name: Toolchain versions
        run: node -v && npm -v

      # npm ci (never npm install) — installs exactly the lockfile.
      #
      # --ignore-scripts: the ONLY install-time script in the whole dependency tree
      # is mongodb-memory-server's postinstall, which downloads the mongod binary.
      # (Dependencies' `prepare` scripts are never run by npm for installed
      # packages.) That download does not belong inside Install: it is a network
      # fetch whose failure is opaque and which cannot be cached there. The
      # dedicated, cached "Pre-fetch mongod binary" step below does it properly and
      # fails with an actionable message. Verified: this exact recipe (clone →
      # npm ci --ignore-scripts → test:setup → jest) is green from a clean clone.
      - name: Install
        run: npm ci --ignore-scripts

      # The pinned mongod binary (package.json → config.mongodbMemoryServer).
      # Cached so tests never download mid-run; a cold cache fetches it once here,
      # not inside a test.
      - name: Cache mongod binary
        uses: actions/cache@v4
        with:
          path: .cache/mongodb-binaries
          key: mongod-${{ runner.os }}-8.2.6

      - name: Pre-fetch mongod binary
        run: npm run test:setup

      - name: Validate rule corpus (Batch 0)
        run: node scripts/validate-corpus.js

      - name: Lint (zero warnings tolerated)
        run: npx eslint src/ --max-warnings=0

      # Type checking. Today this only checks .ts files (checkJs:false) — it is the
      # ratchet for the incremental migration: every file converted to .ts is
      # strict-checked from the moment it lands, and can never regress.
      - name: Typecheck
        run: npx tsc --noEmit

      # Tests + coverage gate in one pass. Thresholds live in jest.config.js;
      # falling below them fails this step and therefore the build.
      # --experimental-vm-modules: pglite (the in-process Postgres used by the
      # pg-odm integration test) is ESM and dynamic-imports its WASM. Invoked via
      # node so the flag is cross-platform (not NODE_OPTIONS).
      - name: Test + coverage gate
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --coverage --ci --runInBand

      # Fails the build on high/critical vulnerabilities in production deps.
      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high

      # Production must fail closed: no secrets => refuse to boot. This asserts the
      # real server process exits non-zero, not just that a unit test passes.
      - name: Production boot must fail closed
        env:
          NODE_ENV: production
        run: |
          set +e
          node src/server.js > boot.log 2>&1
          code=$?
          set -e
          echo "--- boot output ---"; cat boot.log
          if [ $code -eq 0 ]; then
            echo "::error::Server BOOTED in production without secrets. It must fail closed."
            exit 1
          fi
          grep -q "Refusing to start in production" boot.log || {
            echo "::error::Server exited, but not via the fail-closed secrets guard."; exit 1; }
          echo "OK: refused to start without secrets (exit $code)"

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
